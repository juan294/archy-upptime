owner: juan294
repo: archy-upptime

sites:
  - name: Archy (Dashboard)
    url: https://archy-delta.vercel.app
    method: GET
    expectedStatusCode: 200

  - name: Archy API Health
    url: https://archy-delta.vercel.app/api/health
    method: GET
    expectedStatusCode: 200

status-website:
  baseUrl: /archy-upptime
  name: Archy Status
  theme: dark

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "*/5 * * * *"
  uptime: "*/5 * * * *"
